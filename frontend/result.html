<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Summary Result
    </title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <nav class="navbar">

        <div class="logo">

            🎥 AI Video Summarizer

        </div>

        <ul class="nav-links">

            <li>
                <a href="index.html">
                    Home
                </a>
            </li>

            <li>
                <a href="history.html">
                    History
                </a>
            </li>

            <li>
                <a href="about.html">
                    About
                </a>
            </li>

        </ul>

    </nav>

    <section class="result-section">

        <h1 id="title">
            Video Title
        </h1>

        <div class="result-card">

            <h2>
                📖 Overview
            </h2>

            <p id="overview">
                Loading...
            </p>

        </div>

        <div class="result-card">

            <h2>
                ⚠ Problem
            </h2>

            <p id="problem">
                Loading...
            </p>

        </div>

        <div class="result-card">

            <h2>
                ✅ Solution
            </h2>

            <p id="solution">
                Loading...
            </p>

        </div>

        <div class="result-card">

            <h2>
                🎯 Key Points
            </h2>

            <ul id="keyPoints">

            </ul>

        </div>

        <div class="result-card">

            <h2>
                🚀 Action Items
            </h2>

            <ul id="actionItems">

            </ul>

        </div>

    </section>

    <script src="js/result.js"></script>

</body>

</html>
